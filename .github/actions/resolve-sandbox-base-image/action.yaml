name: resolve-sandbox-base-image
description: Resolve the sandbox base image from GHCR, falling back to a local Dockerfile.base build.

runs:
  using: composite
  steps:
    - name: Resolve sandbox base image
      shell: bash
      run: |
        set -euo pipefail

        image="ghcr.io/nvidia/nemoclaw/sandbox-base"
        min_glibc="2.39"
        base_inputs=(Dockerfile.base nemoclaw-blueprint/blueprint.yaml)
        source "${GITHUB_ACTION_PATH}/../base-image-resolver.sh"

        normalize_version_tag() {
          local raw="${1:-}" version
          raw="${raw#refs/tags/}"
          raw="${raw#release/}"
          [[ -n "$raw" && "$raw" != "latest" ]] || return 1
          version="${raw#v}"
          [[ "$version" =~ ^[0-9]+(\.[0-9]+){1,3}([-.][0-9A-Za-z][0-9A-Za-z.-]*)?$ ]] || return 1
          printf 'v%s\n' "$version"
        }

        try_image() {
          local ref="$1" version
          if ! resolver_pull "$ref"; then
            return 1
          fi
          version="$(resolver_glibc_version "$ref" || true)"
          if ! resolver_glibc_ok "$version" "$min_glibc"; then
            echo "::warning::Sandbox base image ${ref} has glibc ${version:-unknown}; need >= ${min_glibc}"
            return 1
          fi
          resolver_write_env BASE_IMAGE "$ref" || return 1
          return 0
        }

        base_inputs_changed() {
          if ! git diff --quiet -- "${base_inputs[@]}"; then
            return 0
          fi

          local base_ref="${GITHUB_BASE_REF:-main}"
          git fetch --no-tags --depth=1 origin \
            "+refs/heads/${base_ref}:refs/remotes/origin/${base_ref}" >/dev/null 2>&1 || true
          if ! git rev-parse --verify "origin/${base_ref}^{commit}" >/dev/null 2>&1; then
            return 1
          fi

          ! git diff --quiet "origin/${base_ref}" HEAD -- "${base_inputs[@]}"
        }

        use_local_base() {
          local version
          echo "::notice::Sandbox base image inputs changed in this checkout; building Dockerfile.base locally"
          resolver_build_local Dockerfile.base nemoclaw-sandbox-base-local
          version="$(resolver_glibc_version nemoclaw-sandbox-base-local || true)"
          if ! resolver_glibc_ok "$version" "$min_glibc"; then
            echo "::error::Local sandbox base image has glibc ${version:-unknown}; need >= ${min_glibc}"
            exit 1
          fi
          resolver_write_env BASE_IMAGE nemoclaw-sandbox-base-local
        }

        candidates=()
        if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]] && tag="$(normalize_version_tag "${GITHUB_REF_NAME:-}")"; then
          candidates+=("${image}:${tag}")
        fi
        exact_tag="$(git describe --tags --exact-match --match 'v*' HEAD 2>/dev/null || true)"
        if tag="$(normalize_version_tag "$exact_tag")"; then
          [[ -n "$tag" ]] && candidates+=("${image}:${tag}")
        fi
        if [[ -f .version ]] && tag="$(normalize_version_tag "$(cat .version)")"; then
          candidates+=("${image}:${tag}")
        fi
        if [[ -n "${GITHUB_SHA:-}" ]]; then
          candidates+=("${image}:${GITHUB_SHA:0:8}" "${image}:${GITHUB_SHA:0:7}")
        fi

        if resolver_try_candidates try_image "${candidates[@]}"; then
          exit 0
        fi

        if base_inputs_changed; then
          use_local_base
          exit 0
        fi

        if try_image "${image}:latest"; then
          exit 0
        fi

        echo "::warning::No compatible GHCR sandbox base image found, building locally"
        use_local_base
