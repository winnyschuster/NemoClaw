          build-cli: "false"

      - name: Run Spark install live test
        # This preserves the
        # Linux + Docker prerequisite gate, the plain non-interactive
        # install.sh/public curl|bash boundary, install-log retention, PATH
        # refresh, and post-install nemoclaw/openshell/--help checks.
        env:
          NVIDIA_INFERENCE_API_KEY: ${{ secrets.NVIDIA_INFERENCE_API_KEY }}
        run: |
          set -euo pipefail
          npx vitest run --project e2e-live \
            test/e2e/live/spark-install.test.ts \
            --silent=false --reporter=default --reporter=test/e2e/risk-signal-reporter.ts

      - name: Upload Spark install artifacts
        if: always()
        uses: NVIDIA/NemoClaw/.github/actions/upload-e2e-artifacts@7768e15eb90d3ee2d33432f481dfe8747e4f6d57

      - name: Clean up Docker auth
        if: always()
        shell: bash
        run: bash .github/scripts/docker-auth-cleanup.sh

  # ── PR result comment ─────────────────────────────────────────────────────
  # Posts a results table on the open PR for the dispatching branch (or the
  # PR identified by `inputs.pr_number`). `if: always()` so the comment lands
  # even when target jobs failed — that's the whole point of a result
  # comment.
  report-to-pr:
    runs-on: ubuntu-latest
    # This entire workflow is dispatch-only. Keeping selective jobs in `needs`
    # makes the report wait for and record any requested job without adding
    # skipped checks to the normal pull_request workflow.
    needs: &e2e-result-jobs
      [
        generate-matrix,
        live,
        shared-e2e,
        openshell-gateway-auth-contract,
        mcp-bridge,
        mcp-bridge-dev,
        skill-agent,
        openclaw-skill-cli,
        inference-routing,
        cloud-inference,
        gpu-e2e,
        agent-turn-latency,
        kimi-inference-compat,
        hermes-inference-switch,
        brave-search,
        ollama-auth-proxy,
        cron-preflight-inference-local,
        credential-sanitization,
        credential-migration,
        sessions-agents-cli,
        hermes-e2e,
        hermes-gpu-startup,
        hermes-dashboard,
        hermes-slack,
        hermes-discord,
        network-policy,
        common-egress-agent,
        shields-config,
        hermes-shields-config,
        rebuild-openclaw,
        rebuild-hermes,
        rebuild-hermes-stale-base,
        sandbox-rebuild,
        sandbox-rlimits-connect,
        overlayfs-autofix,
        state-backup-restore,
        upgrade-stale-sandbox,
        openshell-gateway-upgrade,
        token-rotation,
        messaging-compatible-endpoint,
        messaging-providers,
        launchable-smoke,
        double-onboard,
        jetson-nvmap-gpu,
        concurrent-gateway-ports,
        full-e2e,
        security-posture,
        cloud-onboard,
        gpu-double-onboard,
        onboard-repair,
        issue-4462-scope-upgrade-approval,
        onboard-resume,
        model-router-provider-routed-inference,
        sandbox-operations,
        sandbox-survival,
        diagnostics,
        snapshot-commands,
        openclaw-plugin-runtime-exdev,
        openclaw-tui-chat-correlation,
        gateway-guard-recovery,
        issue-4434-tui-unreachable-inference,
        openclaw-inference-switch,
        bedrock-runtime-compatible-anthropic,
        issue-2478-crash-loop-recovery,
        gateway-health-honest,
        device-auth-health,
        channels-add-remove,
        tunnel-lifecycle,
        telegram-injection,
        openclaw-discord-pairing,
        openclaw-slack-pairing,
        channels-stop-start,
        spark-install,
      ]
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.checkout_sha == '' }}
    permissions:
      actions: read
      # The issue-comment endpoint accepts pull request write permission for PR comments.
      # Keep issues: write absent so this job cannot restore general issue routing.
      pull-requests: write
    steps:
      - name: Post E2E target results to PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          EXPLICIT_ONLY_JOBS: ${{ needs.generate-matrix.outputs.explicit_only_jobs }}
          TEST_MATRIX: ${{ needs.generate-matrix.outputs.test_matrix }}
          JOB_PR_NUMBER: ${{ inputs.pr_number }}
          JOB_TARGETS: ${{ inputs.targets }}
          JOBS: ${{ inputs.jobs }}
        with:
          script: |
            const needs = ${{ toJSON(needs) }};
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const workflowBranch = context.ref.replace('refs/heads/', '');
            const prNumberInput = process.env.JOB_PR_NUMBER || '';
            const rawRequestedTargets = process.env.JOB_TARGETS || '';
            const rawRequestedTestIds = process.env.JOBS || '';
            const selectorValidationPassed = needs['generate-matrix']?.result === 'success';
            const requestedTargets = selectorValidationPassed ? rawRequestedTargets : '';
            const requestedTestIdsCsv = selectorValidationPassed ? rawRequestedTestIds : '';
            const explicitOnlyReasons = {
              'openshell-gateway-auth-contract': {
                job: 'openshell-gateway-auth-contract',
                target: 'openshell-gateway-auth-contract',
                reason: 'default dispatch excludes the resource-heavy OpenShell auth-contract probe unless selected',
              },
              'mcp-bridge-dev': {
                job: 'mcp-bridge-dev',
                target: 'mcp-bridge-dev',
                reason: 'default dispatch excludes moving OpenShell dev artifacts unless explicitly selected',
              },
              'jetson-nvmap-gpu': {
                job: 'jetson-nvmap-gpu',
                target: 'jetson-nvmap-gpu',
                reason: 'default dispatch excludes Jetson; explicit dispatch requires allow_jetson_runner_queue=true after confirming an online Jetson runner because queued jobs do not honor timeout-minutes before assignment',
              },
              'sandbox-rlimits-connect': {
                job: 'sandbox-rlimits-connect',
                target: 'sandbox-rlimits-connect',
                reason: 'default dispatch excludes the destructive rlimit fork/connect probe unless selected',
              },
            };
            const explicitOnlySkippedJobs = (process.env.EXPLICIT_ONLY_JOBS || '')
              .split(',')
              .filter(Boolean)
              .map((job) => explicitOnlyReasons[job] ?? {
                job,
                target: job,
                reason: 'default dispatch excludes this explicit-only job unless selected',
              });
            const targetsRejected = rawRequestedTargets && !selectorValidationPassed;
            const testIdsRejected = rawRequestedTestIds && !selectorValidationPassed;

            let prNumber;
            if (prNumberInput) {
              if (!/^[1-9][0-9]*$/.test(prNumberInput)) {
                core.setFailed(`Invalid pr_number input: ${prNumberInput}. Use a positive pull request number.`);
                return;
              }
              prNumber = Number(prNumberInput);
              if (!Number.isSafeInteger(prNumber)) {
                core.setFailed(`Invalid pr_number input: ${prNumberInput}. Use a safe positive integer.`);
                return;
              }
              try {
                const { data: suppliedPr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                });
                if (suppliedPr.state !== 'open') {
                  core.setFailed(`PR #${prNumber} is ${suppliedPr.state}; E2E reports only comment on open PRs.`);
                  return;
                }
              } catch (error) {
                if (error.status === 404) {
                  core.setFailed(`pr_number ${prNumber} does not identify a pull request in ${context.repo.owner}/${context.repo.repo}.`);
                  return;
                }
                throw error;
              }
            } else {
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${workflowBranch}`,
                state: 'open',
              });
              if (prs.length === 0) {
                core.info(`No open PR found for branch ${workflowBranch} — skipping comment.`);
                return;
              }
              prNumber = prs[0].number;
            }

            const requestedTestIds = requestedTestIdsCsv
              .split(',')
              .map((testId) => testId.trim())
              .filter(Boolean);
            const requestedTestIdSet = new Set(requestedTestIds);
            const selectiveDispatch =
              requestedTestIds.length > 0 || Boolean(requestedTargets) || targetsRejected || testIdsRejected;
            const emoji = { success: '✅', failure: '❌', cancelled: '⚠️', skipped: '⏭️' };
            const safeSelector = /^[A-Za-z0-9_-]+$/;
            let testIds;
            try {
              const testMatrix = JSON.parse(process.env.TEST_MATRIX || '[]');
              if (!Array.isArray(testMatrix)) throw new Error('matrix must be an array');
              testIds = testMatrix.map((row) => {
                if (!row || typeof row !== 'object' || !safeSelector.test(row.id || '')) {
                  throw new Error('matrix row has an invalid id');
                }
                return row.id;
              });
              if (new Set(testIds).size !== testIds.length) {
                throw new Error('matrix repeats a test id');
              }
            } catch (error) {
              core.setFailed(`Invalid test matrix: ${error.message}`);
              return;
            }

            const testResults = new Map();
            const jobLinks = new Map();
            const wallClockRanges = new Map();
            const validatedJobUrl = (job) =>
              Number.isSafeInteger(job.id) && job.id > 0
                ? `${runUrl}/job/${job.id}`
                : undefined;
            const recordJobLink = (name, job) => {
              const url = validatedJobUrl(job);
              if (!url) return;
              const didNotPass =
                job.status === 'completed' &&
                !['success', 'skipped', 'neutral'].includes(job.conclusion);
              const current = jobLinks.get(name);
              if (!current || (didNotPass && !current.didNotPass)) {
                jobLinks.set(name, { didNotPass, url });
              }
            };
            const recordWallClockRange = (name, job) => {
              if (job.conclusion === 'skipped') return;
              const startedAt = Date.parse(job.started_at || '');
              const completedAt = Date.parse(job.completed_at || '');
              if (!Number.isFinite(startedAt) || !Number.isFinite(completedAt) || completedAt < startedAt) {
                return;
              }
              const current = wallClockRanges.get(name);
              wallClockRanges.set(name, {
                startedAt: current ? Math.min(current.startedAt, startedAt) : startedAt,
                completedAt: current ? Math.max(current.completedAt, completedAt) : completedAt,
              });
            };
            const formatWallClockTime = (range) => {
              if (!range) return '—';
              const totalSeconds = Math.round((range.completedAt - range.startedAt) / 1000);
              const hours = Math.floor(totalSeconds / 3600);
              const minutes = Math.floor((totalSeconds % 3600) / 60);
              const seconds = totalSeconds % 60;
              return [hours ? `${hours}h` : '', minutes ? `${minutes}m` : '', `${seconds}s`]
                .filter(Boolean)
                .join(' ');
            };
            let sharedJobResultsLoaded = false;
            try {
              const apiJobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                filter: 'latest',
                per_page: 100,
              });
              const selectedTestIds = new Set(testIds);
              const aggregateJobNames = Object.keys(needs);
              for (const job of apiJobs) {
                const jobName = job.name || '';
                const match = /^Shared E2E \(([A-Za-z0-9_-]+)\)$/.exec(jobName);
                const aggregateJobName = aggregateJobNames.find((name) =>
                  jobName.startsWith(`${name} (`),
                );
                const reportEntryName =
                  match?.[1] ??
                  aggregateJobName ??
                  (/^OpenShell gateway upgrade \(.+\)$/.test(jobName)
                    ? 'openshell-gateway-upgrade'
                    : jobName);
                recordWallClockRange(reportEntryName, job);
                recordJobLink(reportEntryName, job);
                if (!match || !selectedTestIds.has(match[1])) continue;
                const result =
                  job.status === 'completed' &&
                  ['success', 'failure', 'cancelled', 'skipped'].includes(job.conclusion)
                    ? job.conclusion
                    : 'unknown';
                testResults.set(match[1], { jobUrl: validatedJobUrl(job), result });
              }
              sharedJobResultsLoaded = true;
            } catch (error) {
              // The Actions jobs API is the only source of matrix-child conclusions;
              // `needs['shared-e2e']` exposes only their aggregate. Keep missing children
              // unknown instead of fabricating per-test evidence. This path is covered
              // by e2e-report-to-pr-workflow-boundary.test.ts and can be removed when
              // Actions exposes matrix-child conclusions directly to dependent jobs.
              core.warning(`Could not load per-test results; reporting them as unknown: ${error.message}`);
            }
            const missingTestResults = testIds.filter((id) => !testResults.has(id));
            if (sharedJobResultsLoaded && missingTestResults.length > 0) {
              core.warning(`Missing per-test results for ${missingTestResults.join(', ')}; reporting them as unknown.`);
            }
            const sharedJobAggregateResult = needs['shared-e2e']?.result;
            const knownTestResults = testIds.map((id) => testResults.get(id)?.result);
            const allTestResultsKnown =
              knownTestResults.length > 0 &&
              knownTestResults.every((result) => result && result !== 'unknown');
            const expectedAggregateChildResult =
              sharedJobAggregateResult === 'failure'
                ? 'failure'
                : sharedJobAggregateResult === 'cancelled'
                  ? 'cancelled'
                  : undefined;
            const testAttributionMismatch =
              allTestResultsKnown &&
              expectedAggregateChildResult &&
              !knownTestResults.includes(expectedAggregateChildResult);
            if (testAttributionMismatch) {
              core.warning(
                `Per-test conclusions (${knownTestResults.join(', ')}) contradict shared E2E job aggregate ${sharedJobAggregateResult}; reporting child attribution as unknown.`,
              );
              for (const id of testIds) {
                testResults.set(id, { ...testResults.get(id), result: 'unknown' });
              }
            }

            const allEntries = Object.entries(needs)
              .filter(([name]) => name !== 'shared-e2e')
              .map(([name, value]) => [
                name,
                {
                  ...value,
                  jobUrl: jobLinks.get(name)?.url,
                  wallClockRange: wallClockRanges.get(name),
                },
              ]);
            if (needs['shared-e2e']) {
              allEntries.push(
                ...testIds.map((id) => [
                  id,
                  {
                    ...(testResults.get(id) ?? { result: 'unknown' }),
                    jobUrl: testResults.get(id)?.jobUrl ?? jobLinks.get(id)?.url,
                    wallClockRange: wallClockRanges.get(id),
                  },
                ]),
              );
            }
            allEntries.sort(([a], [b]) => a.localeCompare(b));
            const missingRequestedTestIds = selectorValidationPassed
              ? requestedTestIds.filter((testId) => !allEntries.some(([name]) => name === testId))
              : [];
            const selectedEntries = requestedTestIds.length > 0
              ? allEntries.filter(([name]) => requestedTestIdSet.has(name))
              : selectiveDispatch
                ? allEntries.filter(
                    ([name, { result }]) => result !== 'skipped' && name !== 'generate-matrix',
                  )
                : allEntries;
            const reportedEntries = selectedEntries.length > 0
              ? selectedEntries
              : selectiveDispatch
                ? allEntries.filter(([, { result }]) => result !== 'skipped')
                : allEntries;
            const rows = reportedEntries.map(
              ([name, { jobUrl, result, wallClockRange }]) => {
                const label = result === 'failure' ? `[${name}](${jobUrl ?? runUrl})` : name;
                return `| ${label} | ${emoji[result] || '❓'} ${result} | ${formatWallClockTime(wallClockRange)} |`;
              },
            );
            for (const name of missingRequestedTestIds) {
              rows.push(`| ${name} | ❓ not reported | — |`);
            }

            const ran = reportedEntries.filter(([, v]) => v.result !== 'skipped');
            const passed = ran.filter(([, v]) => v.result === 'success');
            const failed = ran.filter(([, v]) => v.result === 'failure');
            const skipped = reportedEntries.filter(([, v]) => v.result === 'skipped');
            const cancelled = ran.filter(([, v]) => v.result === 'cancelled');
            const unknown = ran.filter(([, v]) => v.result === 'unknown');
            const sharedJobAggregateFailed = sharedJobAggregateResult === 'failure';
            const sharedJobAggregateCancelled = sharedJobAggregateResult === 'cancelled';
            const passingStatus = requestedTestIds.length > 0
              ? '✅ All requested tests passed'
              : selectiveDispatch
                ? '✅ All selected tests passed'
                : '✅ All default tests passed';
            const status =
              failed.length > 0 || missingRequestedTestIds.length > 0 || sharedJobAggregateFailed
                ? '❌ Some tests failed'
                : (cancelled.length > 0 || sharedJobAggregateCancelled) && passed.length === 0
                  ? '⚠️ Run cancelled — no signal'
                  : cancelled.length > 0 || sharedJobAggregateCancelled
                    ? '⚠️ Some tests cancelled — partial pass'
                    : unknown.length > 0
                      ? '⚠️ Per-test results incomplete'
                    : skipped.length > 0 && passed.length === 0
                      ? '⚠️ No selected tests ran'
                      : passingStatus;

            const lines = [
              `### E2E Target Results — ${status}`,
              '',
              `**Run:** [${context.runId}](${runUrl})`,
              `**Workflow ref:** \`${workflowBranch}\``,
              targetsRejected
                ? '**Requested targets:** _(selector rejected by workflow validation)_'
                : requestedTargets
                  ? `**Requested targets:** \`${requestedTargets}\``
                  : '**Requested targets:** _(default — all supported)_',
              testIdsRejected
                ? '**Requested test IDs:** _(selector rejected by workflow validation)_'
                : requestedTestIdsCsv
                  ? `**Requested test IDs:** \`${requestedTestIdsCsv}\``
                  : '**Requested test IDs:** _(default — all default-enabled tests; explicit-only tests `openshell-gateway-auth-contract`, `mcp-bridge-dev`, `hermes-gpu-startup`, `sandbox-rlimits-connect`, and `jetson-nvmap-gpu` are skipped unless selected)_',
              `**Summary:** ${passed.length} passed, ${failed.length} failed, ${cancelled.length} cancelled, ${skipped.length} skipped, ${unknown.length} unknown`,
              '',
              '| Test | Result | Total wall clock time |',
              '|-----|--------|-----------------------|',
              ...rows,
            ];
            if (!selectiveDispatch) {
              const skippedJobHints = explicitOnlySkippedJobs
                .map(
                  ({ job, target, reason }) =>
                    `\`${job}\` (${reason}; validate with \`jobs=${job}\` or \`targets=${target}\`)`,
                )
                .join(', ');
              lines.push('', `> **Explicit-only jobs skipped:** ${skippedJobHints}.`);
            }
            if (failed.length > 0) {
              const failedLinks = failed
                .map(([name, { jobUrl }]) => `[${name}](${jobUrl ?? runUrl})`)
                .join(', ');
              lines.push('', `> **Failed tests:** ${failedLinks}. Check [the workflow run](${runUrl}) for all logs and artifacts.`);
            }
            if (missingRequestedTestIds.length > 0) {
              lines.push(
                '',
                `> **Missing requested test IDs:** ${missingRequestedTestIds.join(', ')}. The reporting workflow needs to include these tests.`,
              );
            }
            if (unknown.length > 0) {
              const unknownNames = unknown.map(([name]) => name).join(', ');
              lines.push(
                '',
                `> **Unknown per-test results:** ${unknownNames}. Shared E2E job aggregate: ${needs['shared-e2e']?.result ?? 'unavailable'}.`,
              );
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: lines.join('\n'),
            });

  # ── Scheduled/manual scorecard ────────────────────────────────────────────
  scorecard:
    runs-on: ubuntu-latest
    needs: *e2e-result-jobs
    if: ${{ always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.checkout_sha == '')) }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout scorecard builders
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.checkout_sha || github.sha }}
          persist-credentials: false
          sparse-checkout: |
            ci/onboard-performance-budget.json
            scripts/scorecard
          sparse-checkout-cone-mode: false

      - name: Generate E2E scorecard
        id: scorecard
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          EXPLICIT_ONLY_JOBS: ${{ needs.generate-matrix.outputs.explicit_only_jobs }}
          JOBS: ${{ inputs.jobs }}
          TARGETS: ${{ inputs.targets }}
        with:
          script: |
            const path = require('path');
            const traceTiming = require(
              path.join(process.env.GITHUB_WORKSPACE, 'scripts/scorecard/analyze-trace-timing.mts'),
            );
            const scorecardJobs = require(
              path.join(process.env.GITHUB_WORKSPACE, 'scripts/scorecard/summarize-jobs.mts'),
            );
            const slackBlocks = require(
              path.join(process.env.GITHUB_WORKSPACE, 'scripts/scorecard/build-slack-blocks.mts'),
            );
            const needs = ${{ toJSON(needs) }};
            const safeSelector = /^[A-Za-z0-9_-]+$/;
            const parseSelectors = (value) =>
              value.split(',').map((name) => name.trim()).filter((name) => safeSelector.test(name));
            const rawRequestedJobs = process.env.JOBS || '';
            const rawRequestedTargets = process.env.TARGETS || '';
            const requestedJobs = parseSelectors(rawRequestedJobs);
            const requestedTargets = parseSelectors(rawRequestedTargets);
            const isDispatch = context.eventName === 'workflow_dispatch';
            const isSelectiveDispatch = scorecardJobs.isSelectiveDispatch(
              context.eventName,
              rawRequestedJobs,
              rawRequestedTargets,
            );
            const runMode = isSelectiveDispatch
              ? 'Selective dispatch'
              : isDispatch
                ? 'Manual full run'
                : 'Scheduled E2E';
            const metaJobs = [
              'generate-matrix',
              'report-to-pr',
              'scorecard',
            ];
            const explicitOnly = parseSelectors(process.env.EXPLICIT_ONLY_JOBS || '');
            const explicitlySelected = [...requestedJobs, ...requestedTargets];

            // GitHub's jobs API is the canonical source because `needs.live`
            // collapses every matrix target into one result and has no job URL.
            // The typed helper owns and tests the degraded `needs` fallback.
            const apiJobs = await scorecardJobs.loadWorkflowRunJobs({ github, context, core });

            const { cancelled, failedJobs, failure, ran, skipped, success, total } =
              scorecardJobs.summarizeJobs({
                apiJobs,
                explicitOnlyJobNames: explicitOnly,
                explicitlySelected,
                metaJobNames: metaJobs,
                needs,
              });
            const perfect = ran > 0 && failure === 0 && cancelled === 0;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toLocaleDateString('en-US', {
              month: 'short',
              day: 'numeric',
            });
            const { budgetWarningMessage, traceTimingLine, traceSummaryLines } =
              await traceTiming.buildTraceTimingResult({ github, context, core });
            if (budgetWarningMessage) core.warning(budgetWarningMessage);
            const lines = [
              `## 🌅 NemoClaw E2E Scorecard — ${today}`,
              '',
              `**Run mode:** ${runMode}`,
            ];
            if (requestedJobs.length > 0) {
              lines.push(`**Requested jobs:** ${requestedJobs.map((name) => `\`${name}\``).join(', ')}`);
            }
            if (requestedTargets.length > 0) {
              lines.push(`**Requested targets:** ${requestedTargets.map((name) => `\`${name}\``).join(', ')}`);
            }
            lines.push(
              `**Jobs run:** ${ran} of ${total}`,
              `  ✅ ${success} passed`,
              `  ❌ ${failure} failed`,
              `  🚫 ${cancelled} cancelled`,
              `  ⏭️ ${skipped} skipped`,
            );
            if (failedJobs.length > 0) {
              lines.push('', '**Failed jobs:**');
              for (const job of failedJobs) {
                lines.push(job.url ? `  - [${job.name}](${job.url})` : `  - \`${job.name}\``);
              }
            }
            if (perfect) lines.push('', '🎉 **All jobs passed!**');
            lines.push('', traceTimingLine, ...traceSummaryLines, '', `🔗 [Full run details](${runUrl})`);
            await core.summary.addRaw(lines.join('\n')).write();
            const scorecardData = {
              today,
              runMode,
              actor: context.actor || '',
              isSelectiveDispatch,
              requestedJobs,
              requestedTargets,
              total,
              ran,
              success,
              failure,
              cancelled,
              skipped,
              perfect,
              failedJobs,
              traceTimingLine,
              runUrl,
            };
            core.setOutput('scorecardData', JSON.stringify(scorecardData));
            core.setOutput('slackData', JSON.stringify({
              channel: slackBlocks.getSlackChannel(scorecardData),
              payload: {
                text: slackBlocks.buildFallbackText(scorecardData),
                attachments: [{
                  color: slackBlocks.getStatusColor(scorecardData),
                  blocks: slackBlocks.buildBlocks(scorecardData),
                }],
              },
            }));

      - name: Post scorecard to Slack
        # Webhook secrets never enter branch-dispatched runs. The payload is
        # computed in the preceding no-secret step; this fixed publisher does
        # not load code from the checked-out workflow ref.
        if: ${{ steps.scorecard.outputs.slackData != '' && github.ref == 'refs/heads/main' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SLACK_WEBHOOK_URL_DAILY: ${{ secrets.SLACK_WEBHOOK_URL_DAILY }}
          SLACK_WEBHOOK_URL_FULLRUN: ${{ secrets.SLACK_WEBHOOK_URL_FULLRUN }}
          SLACK_WEBHOOK_URL_PREVIEW: ${{ secrets.SLACK_WEBHOOK_URL_PREVIEW }}
          SLACK_DATA: ${{ steps.scorecard.outputs.slackData }}
          POST_TO_SLACK: ${{ inputs.post_to_slack }}
        with:
          script: |
            const data = JSON.parse(process.env.SLACK_DATA);
            const envByChannel = {
              daily: 'SLACK_WEBHOOK_URL_DAILY',
              fullrun: 'SLACK_WEBHOOK_URL_FULLRUN',
              preview: 'SLACK_WEBHOOK_URL_PREVIEW',
            };
            const channel = data?.channel;
            if (!Object.hasOwn(envByChannel, channel) || !data.payload || typeof data.payload !== 'object') {
              core.setFailed('Invalid precomputed Slack payload');
              return;
            }
            if (channel === 'preview' && process.env.POST_TO_SLACK !== 'true') {
              core.info('Selective dispatch without post_to_slack — skipping');
              return;
            }
            const webhookUrl = process.env[envByChannel[channel]];
            if (!webhookUrl) {
              core.info(`Slack webhook for "${channel}" not configured — skipping`);
              return;
            }
            const response = await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(data.payload),
            });
            if (!response.ok) {
              core.setFailed(`Slack webhook returned ${response.status}`);
            }
