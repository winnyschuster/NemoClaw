name: E2E
run-name: ${{ inputs.risk_correlation != '' && format('E2E risk {0}', inputs.risk_correlation) || format('E2E {0}', github.ref_name) }}

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      targets:
        description: "Optional comma-separated typed target ids. Empty runs all supported live targets."
        required: false
        default: ""
        type: string
      jobs:
        description: "Optional comma-separated free-standing live E2E job ids. Empty runs default-enabled jobs only when targets is also empty; explicit-only jobs openshell-gateway-auth-contract, mcp-bridge-dev, hermes-gpu-startup, sandbox-rlimits-connect, and jetson-nvmap-gpu are skipped unless selected."
        required: false
        default: ""
        type: string
      allow_jetson_runner_queue:
        description: "Repository administrators only: before setting true for jetson-nvmap-gpu, confirm an online Jetson runner in the authoritative NVIDIA/NemoClaw Settings -> Actions -> Runners inventory; queued jobs do not honor timeout-minutes before assignment."
        required: false
        default: false
        type: boolean
      pr_number:
        description: Optional PR number for selective-dispatch result comments.
        required: false
        type: string
        default: ""
      post_to_slack:
        description: Post a selective-dispatch scorecard to the preview Slack route.
        required: false
        default: false
        type: boolean
      checkout_sha:
        description: Current main commit selected by the trusted post-merge shadow controller.
        required: false
        default: ""
        type: string
      risk_plan_hash:
        description: Deterministic post-merge risk-plan hash for shadow evidence correlation.
        required: false
        default: ""
        type: string
      risk_correlation:
        description: UUIDv4 correlation id for an exact-commit shadow risk run.
        required: false
        default: ""
        type: string
      risk_shadow:
        description: Mark this selective run as post-merge risk-gate shadow evidence.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}-${{ inputs.risk_shadow && github.run_id || inputs.targets || 'supported' }}-${{ inputs.risk_shadow && 'risk-shadow' || inputs.jobs || 'all-jobs' }}
  cancel-in-progress: false

env:
  NEMOCLAW_E2E_EXPECTED_SHA: ${{ inputs.checkout_sha }}
  NEMOCLAW_E2E_RISK_PLAN_HASH: ${{ inputs.risk_plan_hash }}
  NEMOCLAW_E2E_RISK_CORRELATION: ${{ inputs.risk_correlation }}
  NEMOCLAW_E2E_RISK_SHARD: default
  NEMOCLAW_E2E_RISK_SHADOW: ${{ inputs.risk_shadow && '1' || '0' }}

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      hermes_selected: ${{ steps.matrix.outputs.hermes_selected }}
      explicit_only_jobs: ${{ steps.matrix.outputs.explicit_only_jobs }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.checkout_sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate exact-commit dispatch
        if: ${{ inputs.checkout_sha != '' || inputs.risk_plan_hash != '' || inputs.risk_correlation != '' || inputs.risk_shadow }}
        env:
          CHECKOUT_SHA: ${{ inputs.checkout_sha }}
          JOBS: ${{ inputs.jobs }}
          PLAN_HASH: ${{ inputs.risk_plan_hash }}
          RISK_CORRELATION: ${{ inputs.risk_correlation }}
          RISK_SHADOW: ${{ inputs.risk_shadow }}
          TARGETS: ${{ inputs.targets }}
          WORKFLOW_EVENT: ${{ github.event_name }}
          WORKFLOW_REF: ${{ github.ref }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          [[ "$WORKFLOW_EVENT" == "workflow_dispatch" && "$WORKFLOW_REF" == "refs/heads/main" ]] || { echo "::error::exact-commit runs require a workflow_dispatch from main"; exit 1; }
          [[ "$RISK_SHADOW" == "true" ]] || { echo "::error::exact-commit inputs require risk_shadow=true"; exit 1; }
          [[ "$CHECKOUT_SHA" =~ ^[a-f0-9]{40}$ ]] || { echo "::error::checkout_sha must be a lowercase 40-character SHA"; exit 1; }
          [[ "$CHECKOUT_SHA" == "$WORKFLOW_SHA" ]] || { echo "::error::checkout_sha must equal the current main workflow commit"; exit 1; }
          [[ "$(git rev-parse --verify HEAD)" == "$CHECKOUT_SHA" ]] || { echo "::error::checked-out HEAD does not match checkout_sha"; exit 1; }
          git merge-base --is-ancestor "$CHECKOUT_SHA" origin/main || { echo "::error::checkout_sha must already be reachable from main"; exit 1; }
          [[ "$PLAN_HASH" =~ ^[a-f0-9]{64}$ ]] || { echo "::error::risk_plan_hash must be a lowercase SHA-256"; exit 1; }
          [[ "$RISK_CORRELATION" =~ ^[a-f0-9]{8}-[a-f0-9]{4}-4[a-f0-9]{3}-[89ab][a-f0-9]{3}-[a-f0-9]{12}$ ]] || { echo "::error::risk_correlation must be a lowercase UUIDv4"; exit 1; }
          [[ -n "$JOBS" && -z "$TARGETS" ]] || { echo "::error::shadow risk runs require selective jobs and forbid targets/fan-out"; exit 1; }

      - name: Prepare E2E workspace
        uses: NVIDIA/NemoClaw/.github/actions/prepare-e2e@50281ee84c4a6fc759da95ea28fc0b7d9c378a28
        with:
          build-cli: "false"

      - id: matrix
        name: Generate E2E target matrix
        env:
          JOBS: ${{ inputs.jobs }}
          TARGETS: ${{ inputs.targets }}
        run: |
          set -euo pipefail
          inventory_output="$(npx tsx tools/e2e/workflow-inventory.mts --shell)"
          allowed_jobs=""
          explicit_only_jobs_csv=""
          free_standing_targets_csv=""
          free_standing_target_jobs_csv=""
          seen_inventory_keys=","
          while IFS= read -r line || [ -n "${line}" ]; do
            line="${line#"${line%%[![:space:]]*}"}"
            line="${line%"${line##*[![:space:]]}"}"
            if [[ -z "${line}" || "${line}" == \#* ]]; then
              continue
            fi
            if [[ ! "${line}" =~ ^(allowed_jobs|explicit_only_jobs_csv|free_standing_targets_csv|free_standing_target_jobs_csv)=([A-Za-z0-9_:-]+(,[A-Za-z0-9_:-]+)*)?$ ]]; then
              echo "::error::free-standing workflow inventory must be data-only key=value" >&2
              exit 1
            fi
            inventory_key="${BASH_REMATCH[1]}"
            inventory_value="${BASH_REMATCH[2]}"
            if [[ "${seen_inventory_keys}" == *",${inventory_key},"* ]]; then
              echo "::error::free-standing workflow inventory must not redefine ${inventory_key}" >&2
              exit 1
            fi
            seen_inventory_keys="${seen_inventory_keys}${inventory_key},"
            case "${inventory_key}" in
              allowed_jobs) allowed_jobs="${inventory_value}" ;;
              explicit_only_jobs_csv) explicit_only_jobs_csv="${inventory_value}" ;;
              free_standing_targets_csv) free_standing_targets_csv="${inventory_value}" ;;
              free_standing_target_jobs_csv) free_standing_target_jobs_csv="${inventory_value}" ;;
            esac
          done <<< "${inventory_output}"
          for required_inventory_key in allowed_jobs explicit_only_jobs_csv free_standing_targets_csv free_standing_target_jobs_csv; do
            if [[ "${seen_inventory_keys}" != *",${required_inventory_key},"* ]]; then
              echo "::error::free-standing workflow inventory missing ${required_inventory_key}" >&2
              exit 1
            fi
          done
          for required_inventory_key in allowed_jobs free_standing_targets_csv free_standing_target_jobs_csv; do
            if [[ -z "${!required_inventory_key:-}" ]]; then
              echo "::error::free-standing workflow inventory missing ${required_inventory_key}" >&2
              exit 1
            fi
          done
          seen_allowed_jobs=","
          IFS=',' read -r -a allowed_job_entries <<< "${allowed_jobs}"
          for job in "${allowed_job_entries[@]}"; do
            if [[ ! "${job}" =~ ^[A-Za-z0-9_-]+$ ]]; then
              echo "::error::free-standing workflow inventory contains invalid job id" >&2
              exit 1
            fi
            if [[ "${seen_allowed_jobs}" == *",${job},"* ]]; then
              echo "::error::free-standing workflow inventory repeats job id" >&2
              exit 1
            fi
            seen_allowed_jobs="${seen_allowed_jobs}${job},"
          done
          seen_explicit_only_jobs=","
          if [ -n "${explicit_only_jobs_csv}" ]; then
            IFS=',' read -r -a explicit_only_job_entries <<< "${explicit_only_jobs_csv}"
            for job in "${explicit_only_job_entries[@]}"; do
              if [[ "${seen_allowed_jobs}" != *",${job},"* ]]; then
                echo "::error::Explicit-only job is not in allowed jobs" >&2
                exit 1
              fi
              if [[ "${seen_explicit_only_jobs}" == *",${job},"* ]]; then
                echo "::error::free-standing workflow inventory repeats explicit-only job" >&2
                exit 1
              fi
              seen_explicit_only_jobs="${seen_explicit_only_jobs}${job},"
            done
          fi
          seen_free_standing_targets=","
          IFS=',' read -r -a free_standing_target_entries <<< "${free_standing_targets_csv}"
          for target in "${free_standing_target_entries[@]}"; do
            if [[ ! "${target}" =~ ^[A-Za-z0-9_-]+$ ]]; then
              echo "::error::free-standing workflow inventory contains invalid target id" >&2
              exit 1
            fi
            if [[ "${seen_free_standing_targets}" == *",${target},"* ]]; then
              echo "::error::free-standing workflow inventory repeats target id" >&2
              exit 1
            fi
            seen_free_standing_targets="${seen_free_standing_targets}${target},"
          done
          IFS=',' read -r -a target_job_entries <<< "${free_standing_target_jobs_csv}"
          seen_target_mappings=","
          derived_free_standing_targets=()
          for entry in "${target_job_entries[@]}"; do
            if [[ ! "${entry}" =~ ^[A-Za-z0-9_-]+:[A-Za-z0-9_-]+$ ]]; then
              echo "::error::Invalid free-standing target mapping" >&2
              exit 1
            fi
            target="${entry%%:*}"
            job="${entry#*:}"
            if [[ "${seen_target_mappings}" == *",${target},"* ]]; then
              echo "::error::free-standing workflow inventory repeats target mapping" >&2
              exit 1
            fi
            seen_target_mappings="${seen_target_mappings}${target},"
            if [[ "${seen_allowed_jobs}" != *",${job},"* ]]; then
              echo "::error::Free-standing target maps to unknown job" >&2
              exit 1
            fi
            derived_free_standing_targets+=("${target}")
          done
          derived_free_standing_targets_csv="$(IFS=,; echo "${derived_free_standing_targets[*]}")"
          if [[ "${free_standing_targets_csv}" != "${derived_free_standing_targets_csv}" ]]; then
            echo "::error::free_standing_targets_csv must match target mapping keys" >&2
            exit 1
          fi
          args=(--emit-live-matrix)
          matrix=""
          hermes_selected=false
          registry_targets=()
          is_free_standing_target() {
            [[ ",${free_standing_targets_csv}," == *",$1,"* ]]
          }
          if [ -n "${JOBS}" ] && [ -n "${TARGETS}" ]; then
            echo "::error::Use either targets or jobs, not both." >&2
            exit 1
          fi
          if [ -n "${JOBS}" ]; then
            if [[ ! "${JOBS}" =~ ^[A-Za-z0-9_-]+(,[A-Za-z0-9_-]+)*$ ]]; then
              echo "::error::Invalid jobs input; use comma-separated job ids" >&2
              exit 1
            fi
            IFS=',' read -r -a selected_jobs <<< "${JOBS}"
            for job in "${selected_jobs[@]}"; do
              if [[ ",${allowed_jobs}," != *",${job},"* ]]; then
                echo "::error::Unknown free-standing E2E job: ${job}" >&2
                echo "::error::Allowed jobs: ${allowed_jobs}" >&2
                exit 1
              fi
              case "${job}" in
                hermes-e2e)
                  hermes_selected=true
                  ;;
              esac
            done
            matrix="[]"
          elif [ -n "${TARGETS}" ]; then
            if [[ ! "${TARGETS}" =~ ^[A-Za-z0-9_-]+(,[A-Za-z0-9_-]+)*$ ]]; then
              echo "::error::Invalid target input; use comma-separated target ids containing only letters, numbers, underscores, and hyphens." >&2
              exit 1
            fi
            IFS=',' read -r -a requested_targets <<< "${TARGETS}"
            for target in "${requested_targets[@]}"; do
              case "${target}" in
                hermes-e2e)
                  hermes_selected=true
                  ;;
              esac
              if is_free_standing_target "${target}"; then
                continue
              fi
              registry_targets+=("${target}")
            done
            if [ "${#registry_targets[@]}" -gt 0 ]; then
              registry_csv="$(IFS=,; echo "${registry_targets[*]}")"
              args+=(--targets "${registry_csv}")
              matrix="$(npx tsx test/e2e/registry/run.ts "${args[@]}")"
            else
              matrix="[]"
            fi
          else
            hermes_selected=true
            matrix="$(npx tsx test/e2e/registry/run.ts "${args[@]}")"
          fi
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo "hermes_selected=${hermes_selected}" >> "$GITHUB_OUTPUT"
          echo "explicit_only_jobs=${explicit_only_jobs_csv}" >> "$GITHUB_OUTPUT"
          MATRIX_JSON="${matrix}" python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os

          rows = json.loads(os.environ["MATRIX_JSON"])
          print("## E2E Target Matrix")
          print()
          print("| Target | Runner | Label |")
          print("| --- | --- | --- |")
          for row in rows:
              print(f"| `{row['id']}` | `{row['runner']}` | {row['label']} |")
          PY

  live:
    needs: generate-matrix
    if: ${{ (github.event_name != 'workflow_dispatch' || inputs.jobs == '') && needs.generate-matrix.outputs.matrix != '[]' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    env:
      E2E_ARTIFACT_DIR: ${{ github.workspace }}/e2e-artifacts/live
      NEMOCLAW_CLI_BIN: ${{ github.workspace }}/bin/nemoclaw.js
      NEMOCLAW_RUN_LIVE_E2E: "1"
      NEMOCLAW_E2E_USE_HOSTED_INFERENCE: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.checkout_sha || github.sha }}
          persist-credentials: false

      # Keep only the credential-bearing step anchored. Cleanup mappings stay
      # explicit because strict YAML decoders reject 100 or more aliases here.
      - &dockerhub-auth
        name: Authenticate to Docker Hub
        env:
          DOCKERHUB_AUTH_REQUIRED: ${{ github.repository == 'NVIDIA/NemoClaw' && github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && '1' || '0' }}
          DOCKERHUB_USERNAME: ${{ github.repository == 'NVIDIA/NemoClaw' && github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && secrets.DOCKERHUB_USERNAME || '' }}
          DOCKERHUB_TOKEN: ${{ github.repository == 'NVIDIA/NemoClaw' && github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && secrets.DOCKERHUB_TOKEN || '' }}
        shell: bash
        run: |
          set -euo pipefail
          docker_config="$(mktemp -d "${RUNNER_TEMP}/docker-config-${GITHUB_JOB}-XXXXXX")"
          chmod 700 "${docker_config}"
          export DOCKER_CONFIG="${docker_config}"
          printf 'DOCKER_CONFIG=%s\n' "${DOCKER_CONFIG}" >> "${GITHUB_ENV}"

          if [[ "${DOCKERHUB_AUTH_REQUIRED}" != "1" ]]; then
            echo "::notice::Docker Hub credentials are withheld for this ref; continuing with anonymous pulls."
            exit 0
          fi
          if [[ -z "${DOCKERHUB_USERNAME}" || -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "::error::Docker Hub credentials are required for trusted E2E runs."
            exit 1
          fi

          auth_marker="${DOCKER_CONFIG}/.nemoclaw-docker-login-attempted"
          : > "${auth_marker}"
          chmod 600 "${auth_marker}"
          login_succeeded=0
          for attempt in 1 2 3; do
            if printf '%s' "${DOCKERHUB_TOKEN}" | timeout 30s docker login docker.io --username "${DOCKERHUB_USERNAME}" --password-stdin; then
              login_succeeded=1
              break
            fi
            if [[ "${attempt}" -lt 3 ]]; then
              echo "::warning::Docker Hub login attempt ${attempt} failed; retrying."
              sleep 5
            fi
          done
          if [[ "${login_succeeded}" -ne 1 ]]; then
            echo "::error::Docker Hub login failed after 3 attempts."
            exit 1
          fi

      - name: Configure live E2E trace directory
        env:
          TARGET_ID: ${{ matrix.id }}
        shell: bash
        run: |
          set -euo pipefail
          printf 'NEMOCLAW_TRACE_DIR=%s\n' "${RUNNER_TEMP}/nemoclaw-e2e-traces/${TARGET_ID}" >> "${GITHUB_ENV}"

      # invalidState: the selected PR-modifiable TUI check needs a PTY driver,
      # but the fixed GitHub-hosted runner image does not provide expect.
      # sourceBoundary: this trusted workflow owns host setup; the PR-controlled
      # check only verifies and consumes expect without privilege.
      # whyNotSourceFix: GitHub-hosted jobs cannot use a repository-owned host
      # image, and caching privileged dpkg state between clean runners is not
      # supported.
      # regressionTest: the workflow-boundary suite pins this target, condition,
      # ordering, retry contract, and exact one-package apt allowlist.
      # removalCondition: remove the install when the hosted runner supplies
      # expect or the acceptance check no longer requires a PTY.
      - name: Install Deep Agents Code TUI host dependencies
        if: ${{ matrix.id == 'ubuntu-repo-cloud-langchain-deepagents-code' }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if sudo apt-get update; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::apt-get update failed after 3 attempts." >&2
              exit 1
            fi
            echo "::warning::apt-get update attempt ${attempt} failed; retrying." >&2
            sleep $((attempt * 5))
          done
          sudo apt-get install -y --no-install-recommends expect

      # Configure NEMOCLAW_TRACE_DIR before workspace prep so every child
      # command writes raw traces under runner temp, never under upload roots.
      - name: Prepare E2E workspace
        uses: NVIDIA/NemoClaw/.github/actions/prepare-e2e@50281ee84c4a6fc759da95ea28fc0b7d9c378a28

      # invalidState: a profile plugin installed with --no-deps can import even
      # when an incomplete base image omitted its required upstream packages.
      # sourceBoundary: this trusted workflow scopes the repo-owned stripped-base
      # build to the exact DCode target; the production Dockerfile must reject it
      # at the isolated import gate before its later dependency-consistency check.
      # whyNotSourceFix: dependency completeness belongs to the hash-locked base;
      # resolving dependencies during local plugin install would duplicate that
      # trust boundary, so the regression constructs the invalid input instead.
      # regressionTest: workflow-boundary tests pin the target, script, and
      # ordering; build-gate tests pin the base build and failure contract.
      # removalCondition: remove only if package installation no longer uses
      # --no-deps or an equivalent earlier build gate proves both imports.
      - name: Verify DCode profile import gate rejects missing base dependencies
        if: ${{ matrix.id == 'ubuntu-repo-cloud-langchain-deepagents-code' }}
        shell: bash
        run: bash scripts/check-dcode-profile-import-gate.sh

      - name: Run live E2E tests
        env:
          NVIDIA_INFERENCE_API_KEY: ${{ secrets.NVIDIA_INFERENCE_API_KEY }}
          TARGET_ID: ${{ matrix.id }}
        run: |
          set -euo pipefail
          npx vitest run --project e2e-live test/e2e/live/registry-targets.test.ts -t "^${TARGET_ID}$" --silent=false --reporter=default --reporter=test/e2e/risk-signal-reporter.ts

      # The sanitizer reads raw traces only after checking the workflow-owned
      # runner-temp path, then writes the timing-only file into upload roots.
      - name: Build trusted live E2E timing summary
        if: always()
        env:
          TARGET_ID: ${{ matrix.id }}
        shell: bash
        run: |
          set -euo pipefail
          expected_trace_dir="${RUNNER_TEMP}/nemoclaw-e2e-traces/${TARGET_ID}"
          if [ -z "${RUNNER_TEMP}" ] || [ "${NEMOCLAW_TRACE_DIR}" != "${expected_trace_dir}" ]; then
            echo "::error::Refusing to sanitize unexpected raw trace path" >&2
            exit 1
          fi
          python3 scripts/e2e/sanitize-trace-timing.py \
            "${NEMOCLAW_TRACE_DIR}" \
            "${E2E_ARTIFACT_DIR}/${TARGET_ID}"

      # Cleanup intentionally runs after sanitization and before upload so raw
      # trace JSON never becomes part of the uploaded artifact surface.
      - name: Delete raw live E2E traces
        if: always()
        env:
          TARGET_ID: ${{ matrix.id }}
        shell: bash
        run: |
          set -euo pipefail
          expected_trace_dir="${RUNNER_TEMP}/nemoclaw-e2e-traces/${TARGET_ID}"
          if [ -z "${RUNNER_TEMP}" ] || [ "${NEMOCLAW_TRACE_DIR}" != "${expected_trace_dir}" ]; then
            echo "::error::Refusing to delete unexpected raw trace path" >&2
            exit 1
          fi
          rm -rf -- "${NEMOCLAW_TRACE_DIR}"

      - name: Summarize artifacts
        if: always()
        env:
          TARGET_ID: ${{ matrix.id }}
          TARGET_LABEL: ${{ matrix.label }}
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["E2E_ARTIFACT_DIR"]) / os.environ["TARGET_ID"]
          plan_path = root / "run-plan.json"
          print("## E2E Targets")
          print()
          print("- Project: `e2e-live`")
          print(f"- Target: `{os.environ['TARGET_ID']}`")
          print(f"- Label: `{os.environ['TARGET_LABEL']}`")
          print(f"- Artifact root: `{root}`")
          print()
          print("| Target | Manifest | Expected state | Suites | Phases |")
          print("| --- | --- | --- | --- | --- |")
          if plan_path.exists():
              plan = json.loads(plan_path.read_text(encoding="utf-8"))
              suites = ", ".join(plan.get("suiteIds") or []) or "(none)"
              phases = ", ".join(plan.get("phases") or []) or "(none)"
              print(
                  "| "
                  f"`{plan.get('targetId') or os.environ['TARGET_ID']}` | "
                  f"`{plan.get('manifestPath') or 'not-yet-defined'}` | "
                  f"`{plan.get('expectedStateId') or 'not-yet-defined'}` | "
                  f"{suites} | {phases} |"
              )
          else:
              print(
                  "| "
                  f"`{os.environ['TARGET_ID']}` | `(missing run-plan.json)` | "
                  "`(missing run-plan.json)` | `(missing)` | `(missing)` |"
              )
          PY

      - name: Upload E2E artifacts
        if: always()
        uses: NVIDIA/NemoClaw/.github/actions/upload-e2e-artifacts@7768e15eb90d3ee2d33432f481dfe8747e4f6d57
        with:
          name: e2e-${{ matrix.id }}
          path: |
            e2e-artifacts/live/${{ matrix.id }}/run-plan.json
            e2e-artifacts/live/${{ matrix.id }}/target.json
            e2e-artifacts/live/${{ matrix.id }}/target-result.json
            e2e-artifacts/live/${{ matrix.id }}/environment.result.json
            e2e-artifacts/live/${{ matrix.id }}/onboarding.result.json
            e2e-artifacts/live/${{ matrix.id }}/state-validation.result.json
            e2e-artifacts/live/${{ matrix.id }}/cloud-onboard-trace-timing-summary.json
            e2e-artifacts/live/${{ matrix.id }}/actions/
            e2e-artifacts/live/${{ matrix.id }}/logs/
            e2e-artifacts/live/${{ matrix.id }}/shell/

      - name: Clean up Docker auth
        if: always()
        shell: bash
        run: bash .github/scripts/docker-auth-cleanup.sh

  # Free-standing live tests under test/e2e/live/ that don't fit the
  # registry-driven steady-state probe model. Each gets a discrete job here
  # because the matrix above only runs registry-targets.test.ts. Modeled on
  # #5049's free-standing pattern.
  openshell-version-pin:
    needs: generate-matrix
    if: ${{ (github.event_name != 'workflow_dispatch' || (inputs.jobs == '' && inputs.targets == '')) || contains(format(',{0},', inputs.jobs), ',openshell-version-pin,') || contains(format(',{0},', inputs.targets), ',openshell-version-pin,') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      E2E_JOB: "1"
      E2E_TARGET_ID: "openshell-version-pin"
      E2E_ARTIFACT_DIR: ${{ github.workspace }}/e2e-artifacts/live/openshell-version-pin
