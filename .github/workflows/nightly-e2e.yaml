        overlayfs-autofix-e2e,
        device-auth-health-e2e,
        launchable-smoke-e2e,
        gpu-e2e,
        gpu-double-onboard-e2e,
        gpu-jetson-nvmap-e2e,
        concurrent-gateway-ports-e2e,
      ]
    if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
    permissions:
      actions: read
    steps:
      - name: Checkout scorecard builder
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          sparse-checkout: |
            scripts/scorecard
          sparse-checkout-cone-mode: false

      - name: Generate nightly scorecard
        id: scorecard
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // ── Config ──────────────────────────────────────────────
            const EXCLUDED_JOBS = new Set(['gpu-e2e', 'notify-on-failure', 'report-to-pr', 'scorecard']);

            // ── Helpers ─────────────────────────────────────────────
            function formatDate(date) {
              return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }

            // ── Gather results from the current run's needs context ─
            const needs = ${{ toJSON(needs) }};
            const today = formatDate(new Date());
            const isDispatch = context.eventName === 'workflow_dispatch';
            const requestedJobsRaw = isDispatch ? (${{ toJSON(inputs.jobs) }} || '').trim() : '';
            const requestedJobs = requestedJobsRaw
              ? requestedJobsRaw.split(',').map((name) => name.trim()).filter(Boolean)
              : [];
            const isSelectiveDispatch = isDispatch && requestedJobs.length > 0;
            const runMode = isSelectiveDispatch
              ? 'Selective dispatch'
              : isDispatch
                ? 'Manual full run'
                : 'Scheduled full nightly';

            // ── Canonical job set (API truth) ──
            // Contract:
            //   - Source: listJobsForWorkflowRun (paginated). `needs` is
            //     insufficient because reusable-workflow inner jobs surface
            //     in the API as "<caller> / <inner>" but in `needs` as the
            //     plain caller ID, and wrapper-vs-inner conclusions can
            //     diverge on re-runs.
            //   - Authoritative fields: name (suffix-stripped), conclusion,
            //     status, html_url, run_attempt, completed_at.
            //   - Fallback on API throw: counts + names from `needs`, no
            //     URLs, may mis-classify wrapper-vs-inner mismatches.
            //     Degraded but still renders the scorecard.
            //   - Removable when `needs` exposes inner reusable-workflow
            //     conclusions + html_url natively (no GitHub feature yet).
            const entries = Object.entries(needs).filter(([name]) => !EXCLUDED_JOBS.has(name));

            let canonicalJobs = null;
            try {
              const apiJobs = await github.paginate(
                github.rest.actions.listJobsForWorkflowRun,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: context.runId,
                  per_page: 100,
                },
              );
              const dedupedByName = new Map();
              for (const j of apiJobs) {
                const name = j.name.replace(/ \/ [^/]+$/, '');
                if (EXCLUDED_JOBS.has(name)) continue;
                // Deterministic: prefer higher run_attempt, then later
                // completed_at as tiebreaker. Independent of API page order.
                const existing = dedupedByName.get(name);
                const isNewer = !existing
                  || (j.run_attempt ?? 0) > (existing.run_attempt ?? 0)
                  || ((j.run_attempt ?? 0) === (existing.run_attempt ?? 0)
                      && (j.completed_at ?? '') > (existing.completed_at ?? ''));
                if (isNewer) dedupedByName.set(name, { ...j, name });
              }
              canonicalJobs = [...dedupedByName.values()];
            } catch (e) {
              const safeMsg = String(e.message ?? 'unknown').slice(0, 200);
              core.warning(`Could not fetch jobs from API (status ${e.status ?? 'unknown'}); falling back to needs context. Reason: ${safeMsg}`);
            }

            // ── Counts ──
            let success = 0;
            let failure = 0;
            let cancelled = 0;
            let skipped = 0;

            if (canonicalJobs) {
              for (const j of canonicalJobs) {
                if (j.conclusion === 'success') success++;
                else if (j.conclusion === 'failure') failure++;
                else if (j.conclusion === 'cancelled') cancelled++;
                else if (j.conclusion === 'skipped' || j.status !== 'completed') skipped++;
                // Catch-all for any other terminal conclusion (timed_out,
                // action_required, neutral, stale, future values) → count as
                // failure so `perfect` stays false on anomalies.
                else failure++;
              }
            } else {
              for (const [, { result }] of entries) {
                if (result === 'success') success++;
                else if (result === 'failure') failure++;
                else if (result === 'cancelled') cancelled++;
                else if (result === 'skipped') skipped++;
              }
            }

            const total = canonicalJobs ? canonicalJobs.length : entries.length;
            const ran = total - skipped;
            const perfect = failure === 0 && cancelled === 0 && ran > 0;

            // ── Failed jobs ──
            const failedJobs = canonicalJobs
              ? canonicalJobs
                  .filter((j) => j.conclusion === 'failure')
                  .map((j) => ({ name: j.name, url: j.html_url }))
                  .sort((a, b) => a.name.localeCompare(b.name))
              : entries
                  .filter(([, { result }]) => result === 'failure')
                  .map(([name]) => ({ name, url: null }))
                  .sort((a, b) => a.name.localeCompare(b.name));

            // ── Fetch prior-day run for trend comparison ────────────
            let trendLine = '';
            if (isSelectiveDispatch) {
              trendLine = 'Trend: ⊘ Not shown for selective dispatches';
            } else {
              try {
                const WORKFLOW_FILE = 'nightly-e2e.yaml';
                const now = new Date();
                const since48h = new Date(now.getTime() - 48 * 60 * 60 * 1000).toISOString();
                const since24h = new Date(now.getTime() - 24 * 60 * 60 * 1000).toISOString();

                const priorRuns = [];
                for (let page = 1; page <= 10 && priorRuns.length === 0; page++) {
                  const { data } = await github.rest.actions.listWorkflowRuns({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    workflow_id: WORKFLOW_FILE,
                    created: `>=${since48h}`,
                    per_page: 100,
                    page,
                  });

                  priorRuns.push(
                    ...data.workflow_runs.filter(r =>
                      r.status === 'completed' &&
                      r.event === 'schedule' &&
                      new Date(r.created_at) < new Date(since24h)
                    )
                  );

                  if (data.workflow_runs.length < 100) break;
                }

                if (priorRuns.length > 0) {
                  // Check the most recent prior run
                  const priorRun = priorRuns[0];
                  const priorPerfect = priorRun.conclusion === 'success';
                  if (perfect && priorPerfect) {
                    trendLine = 'Trend: ➡️ Stable (perfect both days)';
                  } else if (perfect && !priorPerfect) {
                    trendLine = 'Trend: ↗️ Improving (yesterday had failures → today perfect)';
                  } else if (!perfect && priorPerfect) {
                    trendLine = 'Trend: ↘️ Degrading (yesterday perfect → today has failures)';
                  } else {
                    trendLine = 'Trend: ➡️ Stable (failures both days)';
                  }
                } else {
                  trendLine = 'Trend: ⊘ No prior-day data for comparison';
                }
              } catch (e) {
                trendLine = `Trend: ⊘ Could not fetch prior-day data (${e.message})`;
              }
            }

            // ── Build scorecard ─────────────────────────────────────
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const lines = [
              `## 🌅 NemoClaw Nightly Scorecard — ${today}`,
              '',
              `**Run mode:** ${runMode}`,
            ];

            if (isSelectiveDispatch) {
              lines.push(`**Requested jobs:** ${requestedJobs.map((name) => `\`${name}\``).join(', ')}`);
            }

            lines.push(
              `**Jobs run:** ${ran} of ${total}`,
              `  ✅ ${success} passed`,
              `  ❌ ${failure} failed`,
              `  🚫 ${cancelled} cancelled`,
              `  ⏭️ ${skipped} skipped`,
            );

            if (failedJobs.length > 0) {
              lines.push('');
              lines.push('**Failed jobs:**');
              for (const job of failedJobs) {
                lines.push(job.url ? `  - [${job.name}](${job.url})` : `  - \`${job.name}\``);
              }
            }

            if (perfect) {
              lines.push('');
              lines.push('🎉 **All jobs passed!**');
            }

            lines.push('');
            lines.push(trendLine);
            lines.push('');
            lines.push(`🔗 [Full run details](${runUrl})`);

            const scorecard = lines.join('\n');
            core.summary.addRaw(scorecard);
            await core.summary.write();
            core.setOutput('scorecard', scorecard);

            // Structured data for the Slack step.
            // Contract: scripts/scorecard/build-slack-blocks.ts
            const actor = context.actor || '';
            core.setOutput('scorecardData', JSON.stringify({
              today,
              runMode,
              actor,
              isSelectiveDispatch,
              requestedJobs,
              total,
              ran,
              success,
              failure,
              cancelled,
              skipped,
              perfect,
              failedJobs,
              trendLine,
              runUrl,
            }));

      # ── Slack notification ────────────────────────────
      # Production routes (always post; runMode is computed by the generate step):
      #   "Scheduled full nightly" → SLACK_WEBHOOK_URL_DAILY
      #   "Manual full run"        → SLACK_WEBHOOK_URL_FULLRUN
      #
      # Selective dispatch is skipped by default. Devs may opt into the
      # preview channel via post_to_slack=true (SLACK_WEBHOOK_URL_PREVIEW).
      - name: Post scorecard to Slack
        if: ${{ steps.scorecard.outputs.scorecardData != '' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SLACK_WEBHOOK_URL_DAILY: ${{ secrets.SLACK_WEBHOOK_URL_DAILY }}
          SLACK_WEBHOOK_URL_FULLRUN: ${{ secrets.SLACK_WEBHOOK_URL_FULLRUN }}
          SLACK_WEBHOOK_URL_PREVIEW: ${{ secrets.SLACK_WEBHOOK_URL_PREVIEW }}
          SCORECARD_DATA: ${{ steps.scorecard.outputs.scorecardData }}
          POST_TO_SLACK: ${{ inputs.post_to_slack }}
        with:
          script: |
            const path = require('path');
            const {
              buildBlocks,
              buildFallbackText,
              getStatusColor,
              getSlackChannel,
            } = require(
              path.join(process.env.GITHUB_WORKSPACE, 'scripts/scorecard/build-slack-blocks.ts'),
            );

            const data = JSON.parse(process.env.SCORECARD_DATA);
            const channel = getSlackChannel(data);

            // Selective dispatches only post when the user explicitly opts in.
            // Schedule + Manual full run always post.
            if (channel === 'preview' && process.env.POST_TO_SLACK !== 'true') {
              core.info('Selective dispatch without post_to_slack — skipping');
              return;
            }

            const envByChannel = {
              'daily': 'SLACK_WEBHOOK_URL_DAILY',
              'fullrun': 'SLACK_WEBHOOK_URL_FULLRUN',
              'preview': 'SLACK_WEBHOOK_URL_PREVIEW',
            };
            const webhookUrl = process.env[envByChannel[channel]];

            if (!webhookUrl) {
              core.info(`Slack webhook for "${channel}" not configured — skipping`);
              return;
            }

            // Legacy attachment wrapper enables the coloured left-edge bar.
            const payload = {
              text: buildFallbackText(data),
              attachments: [
                {
                  color: getStatusColor(data),
                  blocks: buildBlocks(data),
                },
              ],
            };

            const resp = await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });

            if (!resp.ok) {
              const errBody = (await resp.text()).slice(0, 100).replace(/\s+/g, ' ');
              core.warning(`Slack webhook (${channel}) returned ${resp.status}. Reason (truncated): ${errBody}`);
            } else {
              core.info(`Scorecard posted to Slack (${channel})`);
            }
