name: E2E / Post-merge Risk Gate Shadow

on:
  push:
    branches: [main]

permissions:
  # Required to dispatch the separate E2E workflow; no other Actions mutation is performed.
  actions: write
  checks: write
  contents: read

concurrency:
  group: e2e-post-merge-risk-gate-${{ github.sha }}
  cancel-in-progress: false

jobs:
  shadow:
    if: ${{ github.repository == 'NVIDIA/NemoClaw' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout trusted controller
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.after }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: "22"
          cache: npm

      - name: Install trusted controller dependencies
        run: npm ci --ignore-scripts

      - id: workspace
        name: Create private controller workspace
        shell: bash
        run: |
          set -euo pipefail
          work_dir="$(mktemp -d "${RUNNER_TEMP}/nemoclaw-e2e-risk-gate.XXXXXX")"
          chmod 700 "$work_dir"
          printf 'work_dir=%s\n' "$work_dir" >> "$GITHUB_OUTPUT"

      - id: start
        name: Build plan and dispatch exact-commit E2E
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          node --experimental-strip-types tools/e2e-advisor/post-merge-risk-gate.mts
          --mode start
          --base "${{ github.event.before }}"
          --commit "${{ github.event.after }}"
          --work-dir "${{ steps.workspace.outputs.work_dir }}"

      - name: Upload post-merge risk plan
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: post-merge-risk-plan-${{ github.event.after }}
          path: ${{ steps.workspace.outputs.work_dir }}/post-merge-risk-plan.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Close shadow check after controller startup failure
        if: ${{ always() && steps.start.outputs.check_id != '' && steps.start.outputs.dispatched != 'true' && steps.start.outputs.finalized != 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          node --experimental-strip-types tools/e2e-advisor/post-merge-risk-gate.mts
          --mode abandon
          --check-id "${{ steps.start.outputs.check_id }}"

      - id: wait
        name: Wait for correlated E2E run
        if: ${{ steps.start.outputs.dispatched == 'true' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.start.outputs.run_id }}
        run: |
          wait_status=0
          timeout --signal=TERM --kill-after=30s 105m bash -s <<'WAIT' || wait_status=$?
          set -euo pipefail

          if [[ ! "$RUN_ID" =~ ^[1-9][0-9]*$ ]]; then
            printf '::error title=Invalid correlated E2E run ID::The controller did not provide a positive numeric run ID.\n' >&2
            exit 1
          fi

          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}"

          last_state=""
          while true; do
            if ! state="$(
              gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" \
                --json status,conclusion \
                --jq '.status + ":" + (if (.conclusion == null or .conclusion == "") then "none" else .conclusion end)'
            )"; then
              printf '::error title=Correlated E2E status query failed::Unable to query child run %s. %s\n' \
                "$RUN_ID" "$run_url" >&2
              exit 1
            fi

            if [[ "$state" != "$last_state" ]]; then
              case "$state" in
                queued:none | in_progress:none | requested:none | waiting:none | pending:none)
                  printf 'Correlated E2E run %s status=%s url=%s\n' \
                    "$RUN_ID" "${state%%:*}" "$run_url"
                  ;;
                completed:success)
                  printf 'Correlated E2E run %s status=completed conclusion=success url=%s\n' \
                    "$RUN_ID" "$run_url"
                  ;;
                completed:failure | completed:cancelled | completed:timed_out | completed:action_required | completed:neutral | completed:skipped | completed:stale | completed:startup_failure)
                  printf '::error title=Correlated E2E run did not succeed::Run %s completed with conclusion %s. %s\n' \
                    "$RUN_ID" "${state#*:}" "$run_url" >&2
                  ;;
                *)
                  printf '::error title=Unexpected correlated E2E state::Run %s returned an unsupported status/conclusion pair. %s\n' \
                    "$RUN_ID" "$run_url" >&2
                  ;;
              esac
              last_state="$state"
            fi

            case "$state" in
              queued:none | in_progress:none | requested:none | waiting:none | pending:none)
                sleep 10
                ;;
              completed:success)
                exit 0
                ;;
              *)
                exit 1
                ;;
            esac
          done
          WAIT

          if [ "$wait_status" -eq 124 ]; then
            printf '::error title=Correlated E2E wait timed out::The child run did not complete within 105 minutes.\n' >&2
          fi
          exit "$wait_status"

      - id: evidence
        name: Download correlated E2E evidence
        if: ${{ always() && steps.start.outputs.dispatched == 'true' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.start.outputs.run_id }}
        run: >-
          gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY"
          --dir "${{ steps.workspace.outputs.work_dir }}/evidence"

      - id: finish
        name: Complete exact-commit shadow check
        if: ${{ always() && steps.start.outputs.dispatched == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          node --experimental-strip-types tools/e2e-advisor/post-merge-risk-gate.mts
          --mode finish
          --work-dir "${{ steps.workspace.outputs.work_dir }}"
          --state-hash "${{ steps.start.outputs.state_hash }}"
          --check-id "${{ steps.start.outputs.check_id }}"
          --run-id "${{ steps.start.outputs.run_id }}"

      - name: Close shadow check after completion failure
        if: ${{ always() && steps.start.outputs.check_id != '' && steps.start.outputs.dispatched == 'true' && steps.finish.outcome == 'failure' && steps.finish.outputs.finalized != 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          node --experimental-strip-types tools/e2e-advisor/post-merge-risk-gate.mts
          --mode abandon
          --check-id "${{ steps.start.outputs.check_id }}"

      - name: Summarize shadow controller
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.event.after }}
          CHILD_RUN_ID: ${{ steps.start.outputs.run_id }}
          WORK_DIR: ${{ steps.workspace.outputs.work_dir }}
          START_OUTCOME: ${{ steps.start.outcome }}
          WAIT_OUTCOME: ${{ steps.wait.outcome }}
          EVIDENCE_OUTCOME: ${{ steps.evidence.outcome }}
          FINISH_OUTCOME: ${{ steps.finish.outcome }}
        run: |
          set -euo pipefail

          selected_jobs="unavailable"
          plan_path="${WORK_DIR}/post-merge-risk-plan.json"
          if [ -n "$WORK_DIR" ] && [ -f "$plan_path" ]; then
            selected_jobs="$(node -e '
              const fs = require("node:fs");
              const plan = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
              process.stdout.write(plan.automaticJobs.join(",") || "none");
            ' "$plan_path" 2>/dev/null || printf unavailable)"
          fi

          child_conclusion="not-dispatched"
          if [ -n "$CHILD_RUN_ID" ]; then
            child_conclusion="$(
              gh run view "$CHILD_RUN_ID" --repo "$GITHUB_REPOSITORY" \
                --json conclusion --jq '.conclusion // "none"' 2>/dev/null || printf unavailable
            )"
          fi

          failure_phase="none"
          if [ "$START_OUTCOME" = "failure" ]; then
            failure_phase="plan-and-dispatch"
          elif [ "$FINISH_OUTCOME" = "failure" ]; then
            failure_phase="evidence-verification"
          elif [ "$WAIT_OUTCOME" = "failure" ]; then
            failure_phase="child-run-or-wait"
          elif [ "$EVIDENCE_OUTCOME" = "failure" ]; then
            failure_phase="evidence-download"
          fi

          {
            echo "## Post-merge E2E risk gate shadow"
            echo
            printf -- '- Controller run: [run `%s`](https://github.com/%s/actions/runs/%s)\n' \
              "$GITHUB_RUN_ID" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID"
            printf -- '- Controller commit: `%s`\n' "$COMMIT_SHA"
            printf -- '- Selected jobs: `%s`\n' "$selected_jobs"
            printf -- '- Plan and dispatch: `%s`\n' "$START_OUTCOME"
            if [ -n "$CHILD_RUN_ID" ]; then
              printf -- '- Correlated E2E: [run `%s`](https://github.com/%s/actions/runs/%s)\n' \
                "$CHILD_RUN_ID" "$GITHUB_REPOSITORY" "$CHILD_RUN_ID"
            fi
            printf -- '- Child conclusion: `%s`\n' "$child_conclusion"
            printf -- '- Child wait: `%s`\n' "$WAIT_OUTCOME"
            printf -- '- Evidence download: `%s`\n' "$EVIDENCE_OUTCOME"
            printf -- '- Evidence verification: `%s`\n' "$FINISH_OUTCOME"
            printf -- '- Failure phase: `%s`\n' "$failure_phase"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remove private controller workspace
        if: ${{ always() && steps.workspace.outputs.work_dir != '' }}
        run: rm -rf -- "${{ steps.workspace.outputs.work_dir }}"
