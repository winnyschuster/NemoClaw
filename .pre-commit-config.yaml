# NemoClaw — prek hook configuration
# prek: https://github.com/j178/prek — single binary, no Python required for the runner
# Installed as an npm devDependency (@j178/prek) — available after `npm install`.
# All git hooks (pre-commit, commit-msg, pre-push) are managed by prek via this file only.
# The "prepare" script in package.json runs `prek install` (writes `.git/hooks/*`).
# If you previously used Husky, run: git config --unset core.hooksPath
# then `npm install` again so Git uses the hooks prek installs.
#
# Usage:
#   npx prek install
#   npx prek run --all-files
#
# CI / diff-only runs:
#   npx prek run --from-ref <base> --to-ref HEAD
#
# Priority groups (prek runs same-priority hooks in parallel):
#   0  — General file fixers (whitespace, EOF, line endings)
#   4  — SPDX header insertion (--fix)
#   5  — Shell / JS / TS formatters (shfmt, Biome)
#   6  — Fixes that should follow formatters (ruff check --fix, Biome lint --write)
#  10  — Linters and read-only checks
#  20  — Project-level checks (vitest, coverage, ratchet)

exclude: ^(nemoclaw/dist/|nemoclaw/node_modules/|docs/_build/|\.venv/|uv\.lock$)

# Which git hook shims `prek install` writes (separate from each hook's `stages:`).
# https://prek.j178.dev/configuration/#default_install_hook_types
default_install_hook_types:
  - pre-commit
  - commit-msg
  - pre-push
  - post-merge
  - post-checkout

repos:
  # ── Priority 0: general file fixers ───────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^skills/[^/]+/skill\.oms\.sig$
        priority: 0
      - id: end-of-file-fixer
        exclude: ^skills/[^/]+/skill\.oms\.sig$
        priority: 0
      - id: mixed-line-ending
        args: ["--fix=lf"]
        exclude: ^skills/[^/]+/skill\.oms\.sig$
        priority: 0

  # ── Priority 0: reject force-added ignored files ───────────────────────────
  # Catches `git add -f` of files that .gitignore would normally block.
  # Single source of truth stays in .gitignore — no duplicate list here.
  - repo: local
    hooks:
      - id: no-force-added-ignored
        name: Reject force-added ignored files
        entry: bash -c 'IGNORED=$(git ls-files --ignored --exclude-standard --cached -- "$@") && if [ -n "$IGNORED" ]; then echo "Force-added files that .gitignore would block:" && echo "$IGNORED" && exit 1; fi' --
        language: system
        always_run: true
        pass_filenames: false
        priority: 0

  # ── Priority 4: SPDX headers (insert if missing; runs before language formatters) ──
  - repo: local
    hooks:
      - id: spdx-headers
        name: SPDX license headers (insert if missing)
        entry: bash scripts/check-spdx-headers.sh --fix
        language: system
        files: ^(nemoclaw/src/.*\.ts|scripts/export-catalog-skills\.py|scripts/.*\.ts|nemoclaw-blueprint/.*\.py|.*\.sh)$
        exclude: ^nemoclaw-blueprint/.*__init__\.py$
        pass_filenames: true
        priority: 4

  # ── Priority 3: sync generated docs before read-only validation ───────────
  - repo: local
    hooks:
      - id: platform-matrix-sync
        name: Sync platform matrix to docs
        entry: bash -c 'python3 scripts/generate-platform-docs.py && git add README.md docs/inference/inference-options.mdx'
        language: system
        files: ^(ci/platform-matrix\.json|README\.md|docs/inference/inference-options\.mdx|scripts/generate-platform-docs\.py)$
        pass_filenames: false
        priority: 3

  # ── Priority 5: formatters ────────────────────────────────────────────────
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args:
          - -w
          - -i
          - "2"
          - -ci
          - -bn
        priority: 5

  - repo: local
    hooks:
      - id: biome-format
        name: Biome format
        entry: npx biome format --write --no-errors-on-unmatched
        language: system
        files: ^(biome\.json|package(-lock)?\.json|nemoclaw/package(-lock)?\.json|commitlint\.config\.js|bin/.*\.js|scripts/.*\.(js|ts)|test/.*\.js|nemoclaw/src/.*\.ts)$
        pass_filenames: true
        priority: 5

  # ── Priority 6: auto-fix after formatting ─────────────────────────────────
  - repo: local
    hooks:
      - id: biome-lint-fix
        name: Biome lint fixes
        entry: npx biome lint --write
        language: system
        files: ^(commitlint\.config\.js|bin/.*\.js|src/.*\.ts|scripts/.*\.(js|ts)|test/.*\.js|docs/_ext/.*\.js|nemoclaw/src/.*\.ts)$
        pass_filenames: true
        priority: 6

  # ── Priority 10: linters and validation ─────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
        priority: 10
      - id: check-added-large-files
        args: ["--maxkb=2000"]
        priority: 10
      - id: check-case-conflict
        priority: 10
      - id: check-yaml
        priority: 10
      - id: check-toml
        priority: 10
      - id: check-json
        priority: 10
      - id: detect-private-key
        priority: 10
      - id: check-executables-have-shebangs
        priority: 10
      - id: check-shebang-scripts-are-executable
        priority: 10

  - repo: local
    hooks:
      - id: validate-config-schemas
        name: Validate config files against JSON schemas
        entry: npx tsx scripts/validate-configs.ts
        language: system
        pass_filenames: false
        files: ^(nemoclaw-blueprint/.*\.yaml$|nemoclaw/openclaw\.plugin\.json$|schemas/.*\.json$)
        priority: 10

      - id: repository-checks
        name: Repository checks
        entry: npm run checks
        language: system
        files: ^(bin/.*\.(cjs|js|mjs)$|src/.*\.tsx?$|scripts/.*\.(cjs|js|mjs|ts|tsx)$|test/.*\.(cjs|js|mjs|ts|tsx)$|nemoclaw/src/.*\.tsx?$)
        pass_filenames: false
        priority: 10

      - id: env-var-docs
        name: NEMOCLAW_* env-var documentation gate
        entry: npx tsx scripts/check-env-var-docs.ts
        language: system
        # Triggers the audit when src/, bin/, the docs file, the allowlist,
        # or the gate script itself changes. The script always rescans the
        # whole repo so pass_filenames is false. See #3184.
        files: ^(src/.*\.(ts|tsx|js)|bin/.*\.(ts|js)|docs/reference/commands\.mdx|ci/env-var-doc-allowlist\.json|scripts/check-env-var-docs\.ts)$
        pass_filenames: false
        priority: 10

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        priority: 10

  - repo: local
    hooks:
      - id: hadolint
        name: hadolint
        entry: hadolint
        language: system
        files: (Dockerfile[^/]*|.*\.dockerfile)$
        types: [file]
        priority: 10

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: gitleaks (secret scan)
        priority: 10

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.0
    hooks:
      - id: markdownlint-cli2
        priority: 10

  - repo: local
    hooks:
      - id: docs-to-skills-dry-run
        name: Verify docs-to-skills output
        entry: python3 scripts/docs-to-skills.py docs/ .agents/skills/ --prefix nemoclaw-user --doc-platform fern-mdx --dry-run
        language: system
        files: ^(docs/.*\.mdx?$|docs/conf\.py$|ci/platform-matrix\.json$|scripts/docs-to-skills\.py$|scripts/generate-platform-docs\.py$)
        pass_filenames: false
        priority: 10

  # ── commit-msg hooks ────────────────────────────────────────────────────────
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.24.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional@20"]
        priority: 10

  # ── pre-push hooks ─────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: tsc-plugin
        name: TypeScript (plugin)
        entry: bash -c 'cd nemoclaw && npx tsc --noEmit --incremental'
        language: system
        pass_filenames: false
        files: ^nemoclaw/
        stages: [pre-push]
        priority: 10

      - id: tsc-js
        name: TypeScript (JS config)
        entry: bash -c 'npm run build:cli && npx tsc -p jsconfig.json'
        language: system
        pass_filenames: false
        files: ^(bin|test|scripts)/.*\.js$
        stages: [pre-push]
        priority: 10

      - id: tsc-cli
        name: TypeScript (CLI)
        entry: npx tsc -p tsconfig.cli.json
        language: system
        pass_filenames: false
        files: ^(bin|scripts|src|test|nemoclaw-blueprint/scripts)/.*\.(ts|tsx)$|^tsconfig\.cli\.json$
        always_run: true
        stages: [pre-push]
        priority: 10

      - id: version-tag-sync
        name: package.json ↔ git tag version sync
        entry: bash scripts/check-version-tag-sync.sh
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
        priority: 10

  # ── post-merge / post-checkout: warn about stale compiled dist/ ───────────
  # See #1958 — dist/ is gitignored, so git pull / checkout can leave stale
  # compiled output. This hook warns the developer immediately after the git
  # operation so they rebuild before hitting cryptic runtime errors.
  # The hook always exits 0 — it never blocks a git operation.
  - repo: local
    hooks:
      - id: stale-dist-check
        name: Warn if dist/ is older than src/
        entry: npx tsx scripts/check-stale-dist.ts
        language: system
        always_run: true
        pass_filenames: false
        stages: [post-merge, post-checkout]
        priority: 10

  # ── Priority 20: project-level checks (coverage + ratchet) ─────────────────
  - repo: local
    hooks:
      - id: test-cli
        name: Test (CLI)
        entry: >-
          bash -c 'node -e "require(\"node:fs\").rmSync(\"dist\", { recursive: true, force: true })" && npm run build:cli && npx tsx scripts/check-dist-sourcemaps.ts dist && npx vitest run --project cli --coverage --coverage.reporter=text-summary --coverage.reporter=json-summary --coverage.reportsDirectory=coverage/cli --coverage.include="bin/**/*.js" --coverage.include="dist/lib/**/*.js" --coverage.exclude="test/**/*.js" --coverage.exclude="test/**/*.ts" && npx tsx scripts/check-coverage-ratchet.ts coverage/cli/coverage-summary.json ci/coverage-threshold-cli.json "CLI coverage"'
        language: system
        pass_filenames: false
        files: ^(bin/|src/.*\.(ts|tsx|js|mjs|cjs)$|test/.*\.(ts|tsx|js|mjs|cjs)$)
        require_serial: true
        priority: 20

      - id: test-plugin
        name: Test (plugin)
        entry: bash -c 'npx vitest run --project plugin --coverage --coverage.reporter=text-summary --coverage.reporter=json-summary --coverage.reportsDirectory=coverage/plugin --coverage.include="nemoclaw/src/**/*.ts" --coverage.exclude="**/*.test.ts" && npx tsx scripts/check-coverage-ratchet.ts coverage/plugin/coverage-summary.json ci/coverage-threshold-plugin.json "Plugin coverage"'
        language: system
        pass_filenames: false
        files: ^nemoclaw/
        priority: 20

      - id: source-shape-test-budget
        name: Source-shape test budget
        entry: npm run source-shape:check
        language: system
        pass_filenames: false
        files: ^(test/|scripts/find-source-shape-tests\.ts$|ci/source-shape-test-budget\.json$)
        priority: 20

      - id: test-skills-yaml
        name: Test (skills YAML)
        entry: npx vitest run test/skills-frontmatter.test.ts
        language: system
        pass_filenames: false
        files: ^(\.agents/skills/|docs/.*\.mdx?$|scripts/docs-to-skills\.py$|test/skills-frontmatter\.test\.js$)
        priority: 20

default_language_version:
  python: python3

fail_fast: false
